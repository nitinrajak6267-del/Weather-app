<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>


    <div class="main">
        <div class="card">
            <div class="nav">
                <div class="search">
                    <input type="text" placeholder="Enter the city " spellcheck="false">
                </div>
                <div class="srchicon">
                    <button class="btn">
                        <img src="images/search.png" alt="">

                    </button>
                </div>

            </div>

            <div class="weather">
                <img src="images/rain.png" class="weath-icon">
            </div>

            <div class="detail">
                <div class="city">Bhopal</div>
                <div class="tem">24°C</div>
            </div>

            <div class="check">
                <div class="humidity">
                    <img src="images/humidity.png" alt="">
                    <div class="win">
                        <p class="humi" >
                            50%
                        </p>
                        <p>Humditiy</p>
                    </div>

                </div>

                <div class="wind">
                    <img src="images/wind.png" alt="">
                    <div class="wi">
                       
                        <p class="wd">15 km/h</p>
                         <p>Wind speed</p>
                    </div>
                </div>
            </div>



        </div>


    </div>



    <script src="script.js"></script>
</body>

</html>
